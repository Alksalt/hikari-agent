name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.6"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

      - name: Evals Layer A (hard assertions)
        run: uv run python scripts/run_evals.py --layer a

      - name: Evals Layer B (injection + bypass corpus)
        run: uv run python scripts/run_evals.py --layer b --kind injection,bypass

      - name: Validate tool registry
        run: uv run python scripts/validate_tool_registry.py

      - name: Regenerate .mcp.json check
        run: uv run python scripts/regen_mcp_json.py --check

      - name: Subagent policy drift check
        run: uv run python scripts/regen_subagent_policy.py --check

      - name: Validate MCP servers (skip cred-dependent ones)
        # github stays allow-unreachable here only because the Homebrew
        # github-mcp-server binary isn't installed on runners; local gates
        # enforce it (see CLAUDE.md Ship profile).
        run: uv run python scripts/validate_mcp_servers.py --skip apple_events,google_workspace,notion --allow-unreachable github,playwright
