  # gatekeeper does); it is a policy marker only. Scheduler-internal callers
  # use MANAGER.call() directly and never go through can_use_tool, so they are
  # unaffected by the gate value. The _unsafe variants below (gate: null) are
  # registry documentation for that scheduler-bypass path.
  - id: "mcp__apple_events__create_reminder"
