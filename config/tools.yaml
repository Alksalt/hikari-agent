# ============================================================================
# Subagents
# ============================================================================
#
# recall and code_dispatch are DELETED — their functionality is served by
# direct tool calls (mcp__hikari_memory__recall, mcp__hikari_dispatch__*).
# The 5 remaining subagents are listed here as the authoritative registry.

subagents:
  wiki:
    model: sonnet
    tools:
      - "mcp__hikari_wiki__wiki_search"
      - "mcp__hikari_wiki__wiki_read"
      - "mcp__hikari_wiki__wiki_append"
      - "mcp__hikari_wiki__wiki_backlinks"
      - "mcp__hikari_wiki__wiki_list"
      - "mcp__hikari_wiki__wiki_tree"
      - "mcp__hikari_wiki__morning_brief"
    description_path: "agents/subagents/prompts/wiki.description.md"
    prompt_path: "agents/subagents/prompts/wiki.prompt.md"

  drive_gmail:
    model: sonnet
    tools:
      - "mcp__google_workspace__*"
    description_path: "agents/subagents/prompts/drive_gmail.description.md"
    prompt_path: "agents/subagents/prompts/drive_gmail.prompt.md"

  notion:
    model: sonnet
    tools:
      - "mcp__notion__*"
    description_path: "agents/subagents/prompts/notion.description.md"
    prompt_path: "agents/subagents/prompts/notion.prompt.md"

  research:
    model: sonnet
    tools:
      - "WebFetch"
      - "WebSearch"
      - "mcp__playwright__*"
    description_path: "agents/subagents/prompts/research.description.md"
    prompt_path: "agents/subagents/prompts/research.prompt.md"

  github:
    model: sonnet
    tools:
      - "mcp__github__*"
    description_path: "agents/subagents/prompts/github.description.md"
    prompt_path: "agents/subagents/prompts/github.prompt.md"
