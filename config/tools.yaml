version: 1

# ============================================================================
# Auth Providers
# (merged from config/scopes.yaml providers: block — Phase J)
# ============================================================================

auth_providers:
  google:
    provider_class: auth.google.GoogleProvider
    voice_template: "can't {action} — my {provider} grant doesn't cover {missing_scopes}. run `uv run python -m scripts.auth google grant --add {missing_scopes}` and re-launch me."

  notion:
    provider_class: auth.notion.NotionOAuthProvider
    voice_template: "can't reach notion — token isn't set."

  github:
    provider_class: auth.github.GitHubPATProvider
    voice_template: "can't reach github — token isn't set."

# ============================================================================
# MCP Servers
# ============================================================================
#
# bucket 1 = in-process (create_sdk_mcp_server, no subprocess)
# bucket 3 = external  (command/args/env, subprocess)
#
# runtime_factory: "module:callable" — the @cache factory in agents/runtime.py
# conditional: if true, attached only when extra_allowed_tools intersects
#              the server's tool list (see _build_options)

mcp_servers:
  hikari_memory:
    bucket: 1
    runtime_factory: "agents.runtime:_memory_server"
    conditional: false
    warm_pool_ttl_sec: 0

  hikari_dispatch:
    bucket: 1
    runtime_factory: "agents.runtime:_dispatch_server"
    conditional: false
    warm_pool_ttl_sec: 0

  hikari_utility:
    bucket: 1
    runtime_factory: "agents.runtime:_utility_server"
    conditional: false
    warm_pool_ttl_sec: 0

  hikari_wiki:
    bucket: 1
    runtime_factory: "agents.runtime:_wiki_server"
    conditional: false
    warm_pool_ttl_sec: 0

  hikari_photo:
    bucket: 1
    runtime_factory: "agents.runtime:_photo_server"
    conditional: false
    warm_pool_ttl_sec: 0

  hikari_codex:
    bucket: 1
    runtime_factory: "agents.runtime:_codex_server"
    conditional: false
    warm_pool_ttl_sec: 0

  hikari_router:
    bucket: 1
    runtime_factory: "agents.runtime:_router_server"
    conditional: false
    warm_pool_ttl_sec: 0

  google_workspace:
    bucket: 3
    command: "uvx"
    args:
      - "--from"
      - "google-workspace-mcp==2.0.1"
      - "python"
      - "-c"
      - "import google_workspace_mcp.__main__ as m; m.mcp.run()"
    env:
      GOOGLE_WORKSPACE_CLIENT_ID: {from_env: GOOGLE_WORKSPACE_CLIENT_ID}
      GOOGLE_WORKSPACE_CLIENT_SECRET: {from_env: GOOGLE_WORKSPACE_CLIENT_SECRET}
      GOOGLE_WORKSPACE_REFRESH_TOKEN: {from_env: GOOGLE_WORKSPACE_REFRESH_TOKEN}
    warm_pool_ttl_sec: 1800

  notion:
    bucket: 3
    # v1.4.0 ignores NOTION_TOKEN env var (only reads OPENAPI_MCP_HEADERS).
    # README's "NOTION_TOKEN recommended" applies to 2.x. Stay on 1.4.0 pin,
    # forward the bearer via OPENAPI_MCP_HEADERS until a 2.x review is done.
    command: "npx"
    args:
      - "-y"
      - "@notionhq/notion-mcp-server@1.4.0"
    env:
      OPENAPI_MCP_HEADERS: '{"Authorization": "Bearer ${NOTION_TOKEN}", "Notion-Version": "2022-06-28"}'
    warm_pool_ttl_sec: 1800

  github:
    bucket: 3
    # @modelcontextprotocol/server-github is deprecated upstream but still
    # functional. The attempted Sprint A migration to @github/mcp-server hit
    # a non-existent npm package; the canonical replacement is the Go binary
    # github/github-mcp-server — migration deferred to Sprint B.
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-github@2025.4.8"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: {from_env: GITHUB_PERSONAL_ACCESS_TOKEN}
    warm_pool_ttl_sec: 1800

  playwright:
    bucket: 3
    command: "npx"
    # Sprint 6E: --browser firefox + --isolated + scoped --user-data-dir
    # keep automation away from a logged-in Chrome profile and force a
    # throwaway per-launch dir under /tmp.
    args:
      - "-y"
      - "@playwright/mcp@0.0.75"
      - "--browser"
      - "firefox"
      - "--isolated"
      - "--user-data-dir"
      - "/tmp/hikari-playwright"
    env: {}
    warm_pool_ttl_sec: 60

  apple_events:
    bucket: 3
    command: "npx"
    args:
      - "-y"
      - "mcp-server-apple-events@2.2.1"
    env: {}
    warm_pool_ttl_sec: 1800

  apple_shortcuts:
    bucket: 3
    command: "npx"
    args:
      - "-y"
      - "mcp-server-apple-shortcuts@2025.4.8"
    env: {}
    warm_pool_ttl_sec: 1800

  youtube_transcript:
    bucket: 3
    command: "uvx"
    args:
      - "--from"
      - "git+https://github.com/jkawamoto/mcp-youtube-transcript@v0.6.4"
      - "mcp-youtube-transcript"
    env: {}
    warm_pool_ttl_sec: 300

  duckdb:
    bucket: 3
    command: "uvx"
    args:
      - "--from"
      - "mcp-server-motherduck==1.0.6"
      - "mcp-server-motherduck"
      - "--db-path"
      - ":memory:"
      - "--ephemeral-connections"
      - "--max-rows"
      - "256"
      - "--query-timeout"
      - "15"
    env: {}
    warm_pool_ttl_sec: 300

# ============================================================================
# Tools
# ============================================================================
#
# Explicit ids win over wildcard patterns (longest-prefix match for wildcards).
#
# gate: null | gatekeeper  (defer was removed in Phase 6C — all gated tools use gatekeeper)
# untrusted_output: true if this tool's output must be wrapped before model sees it
# wrap_patterns: list of regex patterns (the PostToolUse wrap hook uses these)
#
# Wildcard entries use glob-style id ending in "*".
# They are lower precedence than explicit ids.

tools:
