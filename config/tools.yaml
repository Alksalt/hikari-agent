    risk_tier: medium
    credentials: null
    example: "dispatch parallel subagent tasks"
    presentation_hint: null

  - id: "WebFetch"
    bucket: 1
    server: null
    gate: null
    untrusted_output: true
    wrap_patterns: ["^WebFetch$"]
    domain: web
    operation: read
    risk_tier: medium
    credentials: null
    example: "fetch https://example.com"
    presentation_hint: search_hits

  - id: "WebSearch"
