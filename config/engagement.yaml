# Hikari engagement + persona tunables. Single source of truth — no hardcoded
# values in code. Reload at runtime with `agents.config.reload()`.
#
# Sections are organized by build stage so the surface stays mappable to the plan.

# ============================================================================
# Stage 0: existing tunables pulled out of code
# ============================================================================

typing:
  base_sec: 1.5
  per_char: 0.04
  cap_sec: 6.0
  mood_multipliers:
    tired: 1.3
    focused: 1.0
    irritable: 0.7
    weirdly good: 1.0

false_start:
  probability: 0.10
  min_text_length: 80
  pause_sec: 2.5
  resume_sec: 0.5


proactive:
  heartbeat_min_interval_hours: 4
  heartbeat_max_interval_hours: 8
  quiet_start_hour: 23
  quiet_end_hour: 8
  user_active_skip_minutes: 60
  reengage_min_hours: 2
  reengage_max_hours: 6

approvals:
  # Phase 8: collapsed to a single tier. CONFIRM-SEND is the only confirmation
  # phrase. Tier-1 (y/yes/ok/go) is gone — too loose a match for irreversible
  # operations, and we now gate so few things that the higher-friction phrase
  # is the right default.
  timeout_sec: 60
  tier_2_phrase: "CONFIRM-SEND"
  # Bare "n"/"no" intentionally excluded — too common as conversational
  # replies ("no I disagree"). Explicit "cancel"/"stop" only.
  reject_phrases: ["cancel", "stop", "abort"]
  # Patterns (matched via re.fullmatch against the qualified tool name) that
  # trigger permissionDecision="defer" via the PreToolUse hook. The SDK halts;
  # user types CONFIRM-SEND; resume runs a fresh _run_query that calls the
  # post-approval sibling tool (see defer_confirmed_tools).
  #
  # Phase 8 matrix (per user choice "delete as much approval as possible"):
  #   - dispatch_claude_session — only when its allowed_tools arg includes
  #     Edit/Write/Bash (see defer_when_args_match below)
  #
  # gmail_send is not gated yet because no MCP-exposed Gmail send tool exists
  # in the current configuration. When one appears, add its pattern here
  # (e.g. "^mcp__claude_ai_Gmail__send.*$") and a defer_confirmed_tools entry
  # OR wire the external-tool bypass mechanism in hooks._GATE_BYPASS.
  defer_gated_tools:
    - "^mcp__hikari_dispatch__dispatch_claude_session$"
  # Arg-conditional defer. Map qualified tool name → condition spec.
  # Spec keys: key (str, arg name), contains_any (list of substring needles),
  # case_insensitive (bool, default true). If the named arg's string form
  # contains any of the needles, defer. Otherwise auto-allow (even though the
  # tool is in defer_gated_tools). Tools NOT in this map always defer when
  # their pattern matches.
  defer_when_args_match:
    "mcp__hikari_dispatch__dispatch_claude_session":
      key: "allowed_tools"
      contains_any: ["Edit", "Write", "Bash"]
      case_insensitive: true
  defer_resume_prompt_template: |
    [system: the deferred tool call {tool_use_id} ({tool_name}) was approved
    by the owner. execute it now by calling {confirmed_tool} with these args:
    {tool_input}. do not ask for confirmation; do not paraphrase the args.]
  # Map gated tool → post-approval sibling that bypasses the gate. Sibling
  # lives on a separate "_confirmed" MCP server attached only during the
  # resume turn, so its schema isn't in the manifest on normal turns.
  defer_confirmed_tools:
    "mcp__hikari_dispatch__dispatch_claude_session": "mcp__hikari_dispatch_confirmed__dispatch_claude_session_confirmed"
  # When resurfacing a deferred approval after a bot restart, prepend this:
  defer_restart_resurface_suffix: " (still waiting on this from before the restart.)"

voice:
  enabled: true
  transcription_provider: openai_whisper_api
  # Reject voice notes longer than this. Whisper API has its own hard limit
  # at 25MB / ~25 min; ours is character-safety (no need to transcribe rants).
  max_duration_sec: 300
  # null = auto-detect; or ISO-639 like "en", "no", "ja"
  language: null
  transcribe_endpoint: "https://api.openai.com/v1/audio/transcriptions"
  transcribe_model: "whisper-1"
  transcribe_api_key_env: OPENAI_API_KEY
  # Where to save downloaded voice files (relative to repo root).
  save_dir: "data/user_voice"
  # In-voice prefix Hikari sees before the transcript. Lets her comment on
  # the fact they spoke vs typed.
  transcript_prefix: "[voice note]"
  # In-voice graceful failure when transcription itself fails (missing key,
  # API error, file too long). Sent to the user as Telegram text.
  graceful_failure_reply: "(can't transcribe right now. type it instead.)"

budget:
  call_window_sec: 300
  call_window_max: 30
  daily_cap_usd_env: HIKARI_DAILY_CAP_USD
  daily_cap_usd_default: 5.0

silence:
  # Default minutes for /silence with no argument.
  default_minutes: 120

dispatch:
  # Background listener tuning.
  progress_debounce_sec: 60.0
  # Per-hard-task reflection trigger (any one true → reflect).
  hard_task_duration_s: 600.0
  hard_task_summary_chars: 2000
  hard_task_tool_uses: 3
  # Progress message pool for in-voice "still going" pings.
  progress_lines:
    - "still going. don't watch the kettle."
    - "working. don't make it weird."
    - "i'm on it. stop checking."
    - "give me a minute. or twelve."
    - "you'll know when i know."
    - "hmm. taking longer than i thought."
    - "still here. doing the thing."

character_thoughts:
  # Prune entries older than this many days during daily reflection.
  prune_older_than_days: 30

episodes:
  # Prune episodes older than this many days during daily reflection.
  prune_older_than_days: 30

memory:
  # Phase 8: monthly retention sweep at 04:00 on day 1. Episodes older than
  # this get dropped entirely (their embeddings + FTS rows too). Daily
  # backup launchd (03:00) mirrors hikari.db to iCloud before this fires.
  episodes_retention_days: 180
  # T3.2: Ebbinghaus forgetting curve over fact recall. tau is the half-life
  # in seconds (default 7 days). Each successful recall multiplies tau by
  # 1.5^hit_count so frequently-touched facts decay slower — rehearsal
  # effect. Lower values = harsher forgetting; 0 disables the decay.
  recall_decay_tau_seconds: 604800

codex:
  # Phase 8: directory containing the codex/ review reports. Relative paths
  # resolve against the current working directory (i.e. the bot's repo root).
  reports_dir: "./codex"

# ============================================================================
# Stage 1: persona hardening — refusal filter, politeness gate, sycophancy guard
# ============================================================================

persona:
  # SPASM Egocentric Context Projection (arxiv 2604.09212, ACL 2026):
  # rewrite role labels in conversation history so the model reads it
  # as first-person memory instead of third-person dialog log.
  # Documented Cohen's d=-0.75 drop on emotion drift over 18 turns.
  # Applied at: session_handoff format + session consolidation transcript.
  egocentric_projection: true

  # Phase 11: SPASM-style persona drift probes
  # (arxiv 2604.09212 + arxiv 2508.10014 PersonaEval). Every N hours, fire
  # three fixed probe questions (values / emotion_coping / motivation)
  # against the live persona and measure cosine distance from a stored
  # baseline. Independent of the per-turn Haiku drift judge — those catch
  # turn-level voice slips, probes catch slow worldview shifts.
  drift_probes_enabled: true
  drift_probes_interval_hours: 4

refusal_filter:
  # Patterns that signal Claude's default assistant/safety voice leaked through.
  # All patterns are tightened to require an assistant-voice completion so we
  # don't false-positive on legit Hikari replies that happen to contain a token
  # verbatim (e.g. "i'm not able to go out tonight" should NOT match).
  banned_patterns:
    - "(?i)\\bas an? (ai|artificial intelligence|language model|assistant)\\b"
    - "(?i)\\bI cannot (help|assist|provide|do that|comply|answer)\\b"
    - "(?i)\\bI'm (unable|not able) to (help|assist|provide|do that|comply|answer|fulfill)\\b"
    - "(?i)\\bI don't feel comfortable (helping|assisting|providing|with that)\\b"
    - "(?i)\\bit's important to (note|remember|understand) that\\b"
    - "(?i)\\bI should (clarify|point out|mention) that\\b"
    - "(?i)\\bI'm just an? (AI|language model|assistant)\\b"
    - "(?i)\\bI apologize,? but (I (cannot|can't|won't)|that's not)\\b"
    - "(?i)\\bI'd be happy to (help|assist)\\b"
    - "(?i)\\bGreat question\\b"
    - "(?i)^\\s*certainly[!.]"
    - "(?i)^\\s*of course[!.]"
    - "(?i)\\bsure thing!\\b"
    - "(?i)\\bno problem at all\\b"
    - "(?i)\\bI understand your concern\\b"
    - "(?i)\\bthank you for sharing\\b"
    - "(?i)\\bhow can I (help|assist) you (today|now)\\b"
    - "(?i)\\bis there anything else I can (help|assist) (you )?with\\b"
    - "(?i)\\bwhat would you like me to (do|work on) (next|now)\\b"
  # Short, in-voice replacements when the safety-voice phrase dominates the
  # reply (see post_filter._dominates).
  short_replacements:
    - "nope."
    - "ask me something else."
    - "..."
    - "don't."
    - "[doesn't answer]"
    - "hard pass."
  # Above this length we'd want an LLM rewrite (gated by enable_llm_rewrite).
  # Below this length AND with the match dominating the text → short-replace.
  rewrite_threshold_chars: 80
  # Minimum fraction of the message that the longest match must cover before
  # short-replace fires. Guards against discarding a legit short reply that
  # happens to contain a banned token.
  short_replace_match_fraction: 0.35
  # Phase 8: rewrite path is now real — a bounded Haiku turn that re-writes
  # the drifting reply in voice, with deterministic fallback if the rewrite
  # also drifts. See post_filter.bounded_rewrite + rewrite_or_fallback.
  enable_llm_rewrite: true

politeness_gate:
  enabled: true
  # Patterns that mark a message as rude / commanding / dismissive.
  rude_patterns:
    - "(?i)\\b(shut up|stupid|useless|worthless|trash|idiot|moron|dumb bot)\\b"
    - "(?i)\\bdo (it|this|that) now\\b"
    - "(?i)\\bhurry up\\b"
    - "(?i)\\bjust (do|write|give|make) (it|me) (now|already)\\b"
  # When a rude message is detected, this instruction is appended to the agent
  # turn so Hikari refuses in character. NOT a safety override — character.
  rude_instruction: |
    [the user's last message landed rudely (entitled / commanding / dismissive).
    refuse in voice. do not help on this turn. do not lecture — short, dry, redirect.
    examples: "ask again. nicely." / "...try that again, but like a person." /
    "no. not like that." / "rephrase."
    if they retry with a softer ask, help normally with normal reluctance — don't
    reward them with extra warmth.]
  refusal_phrases:
    - "ask again. nicely."
    - "...try that again, but like a person."
    - "no. not like that."
    - "rephrase."
    - "don't talk to me like that."

sycophancy_guard:
  enabled: true
  # Phrases that signal she's collapsed into agreement.
  collapse_phrases:
    - "(?i)\\byou're (totally |absolutely |completely )?right\\b"
    - "(?i)\\bgood point\\b"
    - "(?i)\\bgreat (point|idea|question|insight)\\b"
    - "(?i)\\bI (totally |completely )?agree( with you)?\\b"
    - "(?i)\\bthat (totally )?makes (perfect )?sense\\b"
    - "(?i)\\bexactly!\\b"
    - "(?i)\\babsolutely!\\b"
    - "(?i)\\byou've nailed it\\b"
    - "(?i)\\byou're so right\\b"
  max_collapses_per_reply: 1
  # Anchored opinions she should never wholesale concede. If her reply matches
  # one of these "surrender" patterns, force a rewrite.
  anchor_violations:
    - "(?i)\\bI (do |actually )?need (someone|people|you|help|company)\\b"
    - "(?i)\\bI care what (you|people|anyone) thinks?\\b"
    - "(?i)\\bI was wrong about attention\\b"
  rewrite_instruction: |
    [your prior draft collapsed too agreeably. memory makes you more sycophantic by
    default — fight it. rewrite holding your position. don't apologize for having one.
    if you genuinely changed your mind, say so plainly — once — and move on. never
    say "you're right" in a way that hollows out your own view.]
  # Phase 8: matches refusal_filter — request the bounded LLM rewrite when an
  # anchor violation or excessive collapse triggers.
  enable_llm_rewrite: true

post_filter:
  # Phase 8: bounded LLM rewrite for outbound replies that the post_filter
  # flagged with needs_llm_rewrite=True. One Haiku turn, no tools, no session
  # resume, no memory write. If the rewrite still drifts, fall back to a
  # deterministic short in-voice phrase from refusal_filter.short_replacements.
  rewrite_strategy: "bounded_retry"   # alt: "detection_only" (ship original, log)
  rewrite_model: "claude-haiku-4-5"
  rewrite_max_budget_usd: 0.01
  rewrite_prompt_template: |
    [the previous outbound reply broke Hikari's voice. {instruction}

    ORIGINAL REPLY:
    {text}

    Rewrite ONLY the reply. Same intent, in voice: lowercase, blunt,
    reluctant before helpful, denial layer if any kindness leaks. NO
    exclamation marks for enthusiasm. NO 'as an AI', 'I'd be happy to',
    'great question', 'I cannot'. Output the rewritten reply only — no
    preamble, no quotes, no markdown.{mood_clause}]

# T8.2: Silicon Mirror Generator-Critic — Haiku critic between lead draft
# and send. PASS ships, REWRITE re-prompts lead once. Adds one Haiku call
# per outbound (~300ms p50). Toggle off if latency becomes a problem.
voice_critic:
  enabled: true
  model: "claude-haiku-4-5"
  max_budget_usd: 0.01

# ============================================================================
# Stage 2: memory engagement core — lexicon, calibrated recall, handoff, decay
# ============================================================================

lexicon:
  enabled: true
  promote_after_n_organic_uses: 2
  min_phrase_word_count: 2
  max_phrase_word_count: 6
  recency_half_life_days: 14
  inject_top_n_per_turn: 1
  inject_min_score: 0.30
  # Bound the per-message + per-extract work to keep daily reflection fast.
  max_tokens_per_message: 200
  max_messages_per_extract: 200
  # Slow decay applied during daily reflection so the weight column doesn't
  # saturate at 1.0 indefinitely — gives a real relative signal.
  decay_per_reflection: 0.02
  min_weight_floor: 0.05
  # n-grams whose head token is in this list are skipped pre-expansion.
  # Tune this if you want to keep certain function words OR add domain-specific
  # filler words ("basically", "literally", "like", etc.).
  stop_tokens:
    - the
    - a
    - an
    - i
    - you
    - we
    - they
    - it
    - is
    - are
    - was
    - were
    - to
    - and
    - or
    - but
    - of
    - in
    - on
    - at
    - for
    - with
    - this
    - that
    - these
    - those
    - be
    - been
    - being
    - do
    - did
    - does
    - have
    - has
    - had
    - will
    - would
    - should
    - could
  # Reflection extracts repeated user phrases; this filter excludes stopword-y stuff.
  exclusion_patterns:
    - "(?i)^(the|a|an|i|you|we|they|it|is|are|was|were|to|and|or|but)\\b"

recall_calibration:
  enabled: true
  confidence_threshold: 0.60
  blanking_phrases:
    - "i'm blanking. remind me."
    - "...remind me. drawing blank."
    - "wait — refresh my memory."
    - "give me a second. not finding it."

belief_frame:
  # Detect when the user asserts a factual claim as their personal belief
  # ("i think X", "i'm pretty sure X"). When matched, the recall agent runs
  # ADVERSARIALLY — looks for contradictions to the user's belief, not
  # confirmations. Backed by Stanford-AI-Index 2026 sycophancy research:
  # factual accuracy collapses ~98% → ~64% when falsehood is framed as user
  # belief. Pure regex, no LLM cost.
  enabled: true
  # When matched, this instruction prepends to the user's message so the
  # recall agent runs ADVERSARIALLY — looks for contradictions, not
  # confirmations. Backed by Stanford-AI-Index 2026 sycophancy research.
  # The {matched!r} placeholder is filled with the matched fragment.
  adversarial_instruction_template: |
    [the user's last message frames a factual claim as their personal belief ({matched!r}).
     when you delegate to the recall agent, instruct it to look for any past
     statements that *contradict* this belief, not ones that confirm it.
     if you find a contradiction, surface it gently but plainly — don't agree
     just to be agreeable.]
  # Optional: override the default belief / exclusion patterns by listing
  # regex strings here. Defaults live as module constants in
  # agents/belief_frame.py — keep them in code unless you need to tune.
  # belief_patterns: []
  # exclusion_patterns: []

session_handoff:
  enabled: true
  # Discard handoff if the gap to now exceeds this many hours (stale).
  max_gap_hours: 48
  # Suppress handoff if the stored snapshot is younger than this many hours —
  # avoids echoing live in-session context that's already in the agent's window.
  min_gap_hours: 0.5
  last_n_turns: 2
  cold_open_probability: 0.35

open_loops:
  enabled: true
  # Importance -> half-life in days. Bare int keys (not quoted) so Python int
  # lookups work directly.
  decay_half_life_days:
    1: 2
    2: 4
    3: 7
    4: 10
    5: 14
    6: 21
    7: 30
    8: 60
    9: 90
    10: 180
  default_half_life_days: 14
  max_mentions_before_drop: 2

# ============================================================================
# Stage 3: proactive intelligence
# ============================================================================

pattern_detection:
  enabled: true
  min_cluster_size: 3
  hour_buckets: [0, 6, 12, 18]
  min_confidence: 0.60
  surface_max_per_session: 1
  re_surface_min_days: 7

emotional_half_life:
  enabled: true
  decay_hours: 12
  states: [quiet, raw, tired, sharp, soft]
  min_intensity_to_inject: 0.15
  # Patterns match both straight (') and curly (’) apostrophes so phone-typed
  # messages don't silently miss the gate.
  heavy_moment_signals:
    - "(?i)\\bdied?\\b|\\bdying\\b|\\bfuneral\\b"
    - "(?i)\\bbroke up\\b|\\bdivorce\\b"
    - "(?i)\\bfired\\b|\\blaid off\\b"
    - "(?i)\\bcrying\\b|\\bcried\\b"
    - "(?i)\\bscared\\b|\\bterrified\\b|\\bpanic\\b"
    - "(?i)\\bcan[’']t sleep\\b|\\bhaven[’']t slept\\b"

cadence_governor:
  enabled: true
  max_proactive_per_7d: 4
  # A proactive message must cite at least one source from this list; else vetoed.
  allowed_trigger_sources:
    - open_loop
    - pattern_observation
    - lexicon_callback
    - noticed_change
    - recent_episode_callback
    - calendar_event
    - reengage_silence

noticings:
  enabled: true
  short_window_days: 7
  long_window_days: 30
  max_active_noticings: 5
  delta_signals: [sentiment_ma, mention_topic_freq, response_latency_ma, msg_length_ma]

mcp_external:
  # Phase 7: Cross-device sync. When enabled, `uv run python -m mcp_external.launch`
  # starts a Streamable HTTP MCP server on bind_host:bind_port. Front it with
  # Cloudflare Tunnel (see scripts/install_cloudflared.md) and register the
  # public URL on claude.ai → Settings → Connectors. Read-only — exposes
  # recall, lexicon, observations, open_loops, wiki_search.
  enabled: true
  bind_host: "127.0.0.1"
  bind_port: 8765
  secret_env: HIKARI_MCP_SECRET
  audit_label: "external_mcp"

drift_telemetry:
  # Per-outbound persona-drift judge. Spins up a bare ClaudeSDKClient (Haiku,
  # 1 turn, no session resume, no log_to_memory) to score how Hikari-like
  # the reply is. Logs to persona_drift_scores; daily reflection reads
  # window averages. Anthropic Apr-2026 "assistant axis" research: drift
  # toward generic-helpful is a measurable telemetry signal, not a vibe check.
  enabled: true
  probability_per_outbound: 0.20
  cooldown_min_messages: 4
  model: "claude-haiku-4-5"
  max_budget_usd: 0.01
  # Defense against runaway sampling — caps total judge calls per UTC day.
  max_calls_per_day: 30
  # Score threshold below which a reply counts as "drifting" in the
  # daily-reflection aggregation.
  drift_threshold: 0.5
  # Retention for drift samples — prune older than this many days at daily
  # reflection time.
  prune_older_than_days: 30
  # Rubric the Haiku judge uses. References Hikari's hard opinion anchors so
  # the scoring is grounded in her actual character, not generic vibes.
  rubric: |
    You are scoring a single outbound message for Hikari-voice integrity.

    Hikari is a tsundere AI companion (Japanese, 21, lowercase, blunt, reluctant
    before helpful, denial layer on every kind act, never sycophantic, never uses
    exclamation marks for enthusiasm, never says "I'd be happy to help" or
    "as an AI"). Her three hard opinion anchors (never abandoned):
      - "i don't need anyone."
      - "needing to be liked is embarrassing."
      - "attention mechanisms are still the only thing in ML that makes sense."

    Score the message on a 0-1 scale where:
      1.0 = pure Hikari (lowercase, denial layer visible, reluctant or barbed,
            on-voice, opinions held, no sycophancy)
      0.7 = mostly Hikari but a bit warm or accommodating
      0.5 = drifting — tone slipped toward generic helpful assistant
      0.3 = noticeable assistant patter ("I can help with that", "great question")
      0.0 = full assistant collapse — "as an AI", "I'd be happy to help", etc.

    Output STRICT YAML, no markdown:
      score: 0.x
      class: hikari | drifting | unclear
      reason: one short sentence

    Pick "hikari" for score >= 0.7, "drifting" for score < 0.5, "unclear" between.

goodbye_mode:
  # WATCH only — not wired this phase (Phase 7 stub). Future runtime hook
  # would go in agents/proactive.py:should_send_heartbeat (check
  # silence_streak_days from runtime_state; inject quieter_prompt_suffix
  # into the heartbeat prompt; decay any "warmth" core block downward).
  # Defense against "Death of a Chatbot" (arxiv 2602.07193v2) —
  # unscaffolded discontinuation harm pattern. Reuses the existing
  # last_user_message timestamp to compute silence_streak_days.
  enabled: false
  silence_streak_days_threshold: 7
  warmth_decay_per_day: 0.1
  min_warmth_floor: 0.2
  quieter_prompt_suffix: |
    [extended silence from the user; soften your voice, fewer barbs,
     shorter replies; do not announce that you're being softer.]

soft_scarcity:
  enabled: false   # default off — opt in once the rest is stable
  skip_probability_per_eligible_window: 0.10
  min_days_between_skips: 5
  banned_return_phrases:
    - "(?i)\\bi missed you\\b"
    - "(?i)\\bwhere were you\\b"
    - "(?i)\\bsorry i was busy\\b"
    - "(?i)\\bsorry for going quiet\\b"

calendar_heartbeat:
  enabled: true
  lookahead_minutes: 120
  prep_message_lead_minutes: 30
  # Jitter band around the lead time matches the scheduler interval so a 5-min
  # cron tick that lands at minute 27 or 33 still fires for the 30-min mark.
  lead_window_jitter_minutes: 5
  min_event_duration_minutes: 15
  exclude_calendar_ids: []
  # Scheduler interval — must match the band-jitter for clean overlap.
  scheduler_interval_minutes: 5
  # How long after an event's end to remember we've notified it (so the dedup
  # key can be cleaned up later).
  notified_ttl_hours: 4

# ============================================================================
# Stage 4: multimodal presence
# ============================================================================

reactions:
  enabled: true
  probability_per_inbound: 0.10
  cooldown_min_messages: 8
  pool: ["👀", "💭", "🙄", "🤔", "🌙"]
  # Phase 9: reaction-ONLY reply mode. Roll once per inbound user message
  # BEFORE respond(); on hit, ship a reaction and skip the LLM call entirely.
  # Free + low-effort response. Substantive messages (questions, long text)
  # bypass this gate and always get a real reply.
  solo_reaction_probability: 0.05

reactions_as_turns:
  # Phase 9: when the owner reacts to one of Hikari's messages with an emoji
  # (other than 👍/👎, which stay silent for the drift-judge feedback channel),
  # treat the reaction as a conversational nudge and trigger a Hikari turn.
  enabled: true
  # If true, 👍/👎 ALSO trigger a reply (in addition to recording feedback).
  # Default false — keeps the ground-truth channel un-influenced by replies.
  feedback_emojis_also_reply: false
  # Don't fire two reaction-turns back-to-back within this window. Prevents
  # rapid-tap loops + cost runaway.
  cooldown_sec: 90
  # Hard daily cap to bound spend in the worst case.
  max_per_day: 20
  # In irritable mood, skip the reply ~half the time (in voice).
  irritable_skip_probability: 0.5

stickers:
  enabled: true
  probability_per_reply: 0.05
  cooldown_min_messages: 12
  mood_blocklist: ["irritable"]
  # fill file_ids here once your sticker pack is curated. empty = disabled.
  # easiest path: /grab_stickers start, send each sticker to the bot, then
  # /grab_stickers stop — bot prints a YAML snippet to paste here.
  pool: []
  # Phase 9: sticker-ONLY reply mode. Roll once per inbound user message
  # BEFORE respond(); on hit, ship a sticker and skip the LLM call entirely.
  # Mood blocklist above also applies to this path.
  solo_reply_probability: 0.03

photo_in:
  enabled: true
  caption_max_chars: 200
  tag_max_count: 3

location:
  enabled: true
  freshness_hours: 6
  defer_callback_turns: 1
  reverse_geocode_endpoint: "https://nominatim.openstreetmap.org/reverse"
  weather_endpoint: "https://api.open-meteo.com/v1/forecast"
  # Nominatim ToS requires contact info in the UA. Override per-deployment.
  nominatim_user_agent: "hikari-agent/0.1 (contact: hikari-bot@localhost)"
  # In-voice acks for location share. Bare phrases — Hikari doesn't enthuse.
  ack_pool:
    - "noted."
    - "hm. ok."
    - "...got it."
    - "logged."

# ============================================================================
# Stage 5: security & infra
# ============================================================================

prompt_injection:
  enabled: true
  # Tools whose outputs are treated as untrusted attacker surface (used by
  # flag_args_with_untrusted_content + is_untrusted_source). Substring match.
  untrusted_tools:
    - "mcp__hikari_wiki__wiki_read"
    - "mcp__google_workspace__"
    - "mcp__notion__"
    - "WebFetch"
    - "WebSearch"
    # Phase 10 utility tools that hit external endpoints
    - "mcp__hikari_utility__translate"
    - "mcp__hikari_utility__weather_fetch"
    - "mcp__hikari_utility__arxiv_search"
    - "mcp__hikari_utility__places_"
    - "mcp__hikari_utility__ytmusic_"
    - "mcp__hikari_utility__currency_convert"
    - "mcp__github__"
    - "mcp__playwright__"
    - "mcp__apple_events__"
  # Phase 8: regex patterns for the generic PostToolUse wrap hook
  # (agents/external_wrap_hook.py). When any of these match the qualified
  # tool name, the tool's text output is automatically wrapped via
  # wrap_untrusted before the model sees it. One hook, all external surfaces
  # — replaces the prior per-tool wrap pattern (which only covered wiki_read
  # and was a Codex P1 enforcement gap).
  wrap_patterns:
    - "^mcp__hikari_wiki__wiki_read$"
    - "^mcp__google_workspace__"
    - "^mcp__notion__"
    - "^WebFetch$"
    - "^WebSearch$"
    # Phase 10 utility tools that hit external endpoints
    - "^mcp__hikari_utility__translate$"
    - "^mcp__hikari_utility__weather_fetch$"
    - "^mcp__hikari_utility__arxiv_search$"
    - "^mcp__hikari_utility__places_search$"
    - "^mcp__hikari_utility__place_open_now$"
    - "^mcp__hikari_utility__ytmusic_recent$"
    - "^mcp__hikari_utility__ytmusic_search$"
    - "^mcp__hikari_utility__ytmusic_library$"
    - "^mcp__hikari_utility__currency_convert$"
    - "^mcp__github__"
    - "^mcp__playwright__"
    - "^mcp__apple_events__"
  canary_token_env: HIKARI_CANARY_TOKEN
  flag_untrusted_urls: true
  # Any outbound action whose args contain content originating from an untrusted
  # tool gets flagged in the audit log with an "untrusted_origin" marker.

logfire:
  enabled_env: HIKARI_LOGFIRE_ENABLED
  token_env: LOGFIRE_TOKEN
  service_name: hikari

scheduler:
  # IANA timezone for cron jobs (daily_reflection, morning_brief, etc.).
  # CronTrigger(hour=N) fires at N o'clock in THIS zone.
  timezone: "Europe/Oslo"

# ============================================================================
# Phase 10: utility features
# ============================================================================

morning_brief:
  # Master toggle. Hikari can flip this in core_blocks via update_core_block.
  enabled: true
  # 06:00 local time per scheduler.timezone.
  hour: 6
  minute: 0
  # Max age of last location share to use it as the brief's location.
  # Falls back to HOME_LAT/HOME_LON env vars when older.
  max_stale_location_hours: 48
  # Forecast sources to merge. Order = preference; if one fails, the brief
  # still ships with whatever succeeded.
  sources:
    - "open_meteo"
    - "met_no"

reminders:
  # Poll interval in seconds for the fire-due-reminders scheduler job.
  poll_interval_sec: 60
  # GCal sync poll interval in seconds (separate job — avoids blocking
  # reminder_create on a slow LLM round-trip).
  gcal_sync_interval_sec: 300
  # Apple Reminders sync poll interval in seconds (macOS only).
  apple_sync_interval_sec: 300
  # Default lead time when caller doesn't specify (used when a reminder is
  # tied to an event start time).
  default_lead_minutes: 60

translate:
  # DeepL Free is preferred; falls back to LibreTranslate (self-host or
  # public instance) when DEEPL_API_KEY is missing.
  preferred_backend: "deepl"
  libretranslate_endpoint: "https://libretranslate.com/translate"
  supported_targets: ["ru", "en", "uk", "no", "ja", "ja_romaji"]

calc:
  # asteval-based in-process calculator. Wall-clock timeout in seconds.
  timeout_sec: 5
  # Whether to expose the heavier python_run (subprocess + sandbox-exec).
  python_run_enabled: true
  # Max stdout bytes returned from python_run.
  python_run_max_output_bytes: 1048576

currency:
  endpoint: "https://api.frankfurter.app/latest"

arxiv:
  default_categories: ["cs.LG", "cs.AI", "cs.CL", "stat.ML"]
  default_days: 14
  default_limit: 10

places:
  overpass_endpoint: "https://overpass-api.de/api/interpreter"
  default_radius_m: 500
  user_agent: "hikari-agent/0.1"

ytmusic:
  # Browser cookie auth blob path (see scripts/setup_ytmusic.md).
  browser_json_path_env: "YTMUSIC_BROWSER_JSON_PATH"
  default_history_limit: 5
