# Module-level constants moved out of code into here so behavior is tunable
# without touching Python. Defaults preserve prior behavior exactly.

link_shelf:
  fetch_timeout_sec: 5.0          # HTTP timeout when fetching URL metadata
  fetch_max_bytes: 200000         # byte cap on resp.content before decode
  user_agent: "hikari-agent link-shelf/1.0 (+https://github.com/hikari-agent)"
  search_default_limit: 10        # link_search default `limit`
  list_default_limit: 20          # link_list default `limit`
  valid_kinds: [later, useful, source, inspiration]

compound_turn:
  # Per-step read timeout in seconds. Writes get ×2 this budget.
  step_timeout_s: 12.0

runtime:
  # Defaults previously hardcoded as module-level constants in agents/runtime.py.
  # Env-var overrides still take precedence: HIKARI_MODEL, HIKARI_MODEL_FALLBACK.
  model_primary: "claude-sonnet-4-6"
  model_fallback: "claude-sonnet-4-5"  # MUST differ from primary — SDK refuses identical model+fallback
  default_max_turns: 4            # per-turn cap for chat-path SDK calls; substituted into assets/PERSONA.md via {max_turns}
  # Wall-clock budget for the SDK turn loop. Chat default fits a single
  # quick MCP roundtrip + reply; scheduled actions get headroom for
  # write-heavy MCP work (Notion DB creation, multi-row inserts).
  sdk_turn_timeout_s: 90
  sdk_scheduled_action_timeout_s: 180
  scheduled_action_max_budget_usd: 0.40
  scheduled_action_max_turns: 6
  cache_ttl_1h_enabled: true
  agent_sdk_monthly_credit_usd: 200  # Anthropic Agent SDK credit bucket (separate from interactive plan)

reflection:
  near_dup_cosine_threshold: 0.92    # embedding dedup sensitivity
  max_pairs: 500                     # co-occurrence graph cap per pass
  weekly_window_days: 7              # sleep-agent consolidation window
  weekly_summary_word_cap: 220       # weekly synthesis target length
  snippet_truncation_long: 300       # used for full message snippets
  snippet_truncation_medium: 220     # used for fact/episode snippets
  snippet_truncation_short: 200      # used for compact log entries

retrieval:
  # Park et al. retrieval weights — tune to shift the recency/importance/relevance balance.
  w_recency: 1.0
  w_importance: 1.0
  w_relevance: 1.5
  recency_decay_per_hour: 0.99
  vec_k: 30                       # KNN candidate pool size (vec index)
  bm25_k: 30                      # BM25 candidate pool size
  hybrid_vec_weight: 0.6          # final blend: hybrid_vec_weight * vec + hybrid_bm25_weight * bm25
  hybrid_bm25_weight: 0.4

telegram:
  http_timeout_sec: 10.0          # httpx client timeout in agents/telegram_bridge.py

evening_diary:
  enabled: true
  hour: 22                        # local hour for the daily diary composition
  minute: 0

drift_canary:
  enabled: true
  alert_threshold: "drift"        # 'hold' | 'partial' | 'drift' — alert when verdict >= threshold

# Ghost-of-Future-Self letter (MIT Media Lab "Future You" pattern).
# Once a month, Hikari composes a letter AS the user, 5 years from now,
# reflecting on a decision drawn from the past 30 days of real activity:
# receipts, episodes, character_thoughts, weekly consolidations. Persisted
# in the future_letters table + a markdown file in data/future_letters/.
# Delivered via Telegram as plain text (chunked if longer than the limit).
future_letter:
  enabled: true
  # Trigger window — first Sunday of the month at hour:minute local. The
  # day='1-7' + day_of_week='sun' combination fires on whatever Sunday falls
  # in the first week of the month, avoiding the 1st-of-month overlap with
  # memory_prune (which runs at 04:00 on day 1).
  hour: 10
  minute: 0
  # User's current age. The letter is written as the user 5 years from now,
  # so it'll address the reader at age (user_age + 5). Update yearly.
  user_age: 26
  # Budgets for the two LLM passes inside run_future_letter. Theme picker
  # is cheap (read-only structured input → one-sentence theme); composition
  # is the main writing pass.
  theme_picker_max_budget_usd: 0.05
  composition_max_budget_usd: 0.30
  # Output paths and chunking. data/future_letters/YYYY-MM.md is the
  # durable, human-readable archive that survives DB resets. The chunk
  # limit is Telegram's 4096 char hard cap with margin for safety markers.
  file_dir: "data/future_letters"
  telegram_chunk_chars: 3800
  # Sparse-data threshold for the NO_LETTER veto in compose_letter — if the
  # past 30 days produced fewer than this many receipt entries AND no
  # episodes, the model is asked to decline rather than fabricate a letter.
  min_receipts_for_letter: 5

decision_log:
  enabled: true
  # Weekly Sunday 19:00 local — sits before drift_canary at 20:00 so they
  # don't double-fire a heavy proactive within the same hour.
  hour: 19
  minute: 0
  # Cap on overdue decisions asked about per weekly run. Higher feels naggy.
  max_per_week_ask: 3
  # Window for the Brier rolling score surfaced in voice.
  brier_window_days: 90
  # Days to wait before re-asking about the same decision after a check.
  reask_cooldown_days: 14

auth:
  precheck: enforce              # was shadow in Sprint 2; set AUTH_PRECHECK_OVERRIDE=shadow to revert at runtime

retention:
  messages_days: 365
  oauth_audit_log_days: 365
  calendar_notifications_days: 90

# SQLite connection-pool busy timeout. Raised from default 0 to avoid
# "database is locked" under concurrent writes (scheduler + bridge threads).
sqlite:
  busy_timeout_ms: 5000

engagement:
  # Phase F: "The Daily Nothing" — one random weekday per week, all proactive
  # sources gate silent. User-anchored responses still work normally.
  # Scarcity drives perceived value (iOS notification fatigue research).
  weekly_silent_day_enabled: true
  # Eligible weekdays for the silent-day draw (sat/sun excluded by default:
  # sat is "unstructured", sun is "low" and already persona-soft).
  weekly_silent_day_pool: [mon, tue, wed, thu, fri]

  # priority_tier: 1=high (time-sensitive), 2=normal, 3=background
  # min_interval_minutes: hard gate — source is silenced until this window elapses
  # send_mode: proactive | observation | silent
  # min_value_score: 0.0–1.0 — discard tick if selector score < this threshold
  # interruption_right: low | medium | high — gates whether source may interrupt quiet hours

  # Value rubric weights for value_score computation in the selector.
  # anchor: does the candidate reference a real, named event/object? (+0.0–0.2)
  # user_value: does the user benefit from receiving this? (+0.0–0.3)
  # actionability: does it suggest a concrete next step? (+0.0–0.2)
  # timing: is the current time slot suitable? (+0.0–0.15)
  # interruption_cost: subtracted based on interruption_right level (0.0–0.15)
  value_rubric:
    weights:
      anchor: 0.2
      user_value: 0.3
      actionability: 0.2
      timing: 0.15
      interruption_cost: 0.15
    # interruption_right → base_cost (subtracted from value_score)
    interruption_cost_map:
      low: 0.05
      medium: 0.10
      high: 0.0  # high = user opted in, no cost
