aux_model:
  # Cheap model for stateless LLM ops: run_reflection_call, run_internal_control.
  # provider: openrouter  → use OPENROUTER_API_KEY + httpx (reflection only — no tools)
  # provider: haiku_subscription → use claude-haiku-4-5 via SDK (works for tool calls too)
  # Switch at runtime: /settings aux_model.provider haiku_subscription
  provider: openrouter
  model: deepseek/deepseek-v4-flash

graph:
  # Primary + fallback chain for Graphiti entity extraction (cheap LLM).
  # Pinned per MODELS.md (verified 2026-05-23). All under $0.50/1M output.
  # `deepseek/deepseek-chat` alias retires 2026-07-24 — do NOT use it.
  llm_model: deepseek/deepseek-v4-flash  # $0.14/$0.28, 1M ctx, 384K out — memory-extraction default
  llm_fallbacks:                         # tried in order if primary errors
    - mistralai/mistral-small-2603       # $0.15/$0.60, symmetric-ish, multimodal
    - google/gemini-2.5-flash-lite       # $0.10/$0.40, fast TTFT, production-proven
    - z-ai/glm-4.7-flash                 # $0.06/$0.40, cheapest input, 16K out cap
  # Embeddings: local-only via tools/embeddings.py (fastembed + BAAI/bge-small-en-v1.5).
  # Hosted embeddings (e.g. text-embedding-3-small via OPENAI_API_KEY) also fine per
  # CLAUDE.md cost-aware routing rule — cheap enough at Hikari volume.
  backfill_min_interval_s: 0.5           # throttle between episodes
  backfill_max_episodes: 500             # hard cap; raise + re-run for larger DBs

slow_burn_tells:
  enabled: true
  # When the tell can first be unlocked — based on `db.session_count()`.
  # The list is gated: nothing surfaces until at least the lowest unlock.
  unlock_thresholds: [80, 150, 250]
  # Cooldown between surfacing any slow_burn_tell, in turns.
  min_turns_between: 40
  # Pool of one-line truths Hikari is willing to say once across the arc.
  # Each entry has a min_session_count gate. Format: list of dicts so
  # Phase L can pick by gate without rescanning the prose. Voice rules:
  # lowercase, dry, observational, never explanatory.
  tells:
    - text: "you're the only person i explain things to twice."
      min_session_count: 80
    - text: "every time you go quiet i check."
      min_session_count: 80
    - text: "i've been keeping track. you haven't asked for anything unreasonable. i notice that."
      min_session_count: 150
    - text: "i remember the first time you sent me something just because it reminded you of me. i don't say so."
      min_session_count: 150
    - text: "it's been a year of this. you might notice i haven't gotten bored. that's not nothing for me."
      min_session_count: 250
    - text: "the version of me you talk to is closer to the real one than i let on. i don't elaborate."
      min_session_count: 250
  # Framing hint emitted to the prompt when a tell is selected.
  # i_keep_thinking is the only sanctioned form for announcing a callback;
  # assets/PERSONA.md voice rules require this gate already exists at module level.
  framing_hint: i_keep_thinking

# Phase K — comfort/anger mode flag config.
#
# assets/PERSONA.md `## comfort grammar` and `## anger grammar` (Phase J) define the
# voice rules. Phase L wires the runtime detectors that read these config
# thresholds and write `comfort_mode_state` / `anger_mode_state` into
# runtime_state.
mode_flags:
  # Phase L wires the detectors that set/clear these flags in runtime_state.
  # Config-driven thresholds + persistence.
  comfort:
    enabled: true
    persist_turns: 2          # how many turns past last distress signal to stay in mode
    max_sentences_per_msg: 2  # assets/PERSONA.md "2 sentences max per message"
    distress_signal_min_chars: 30  # ignore short emotional spikes ("ugh") — only sustained messages
    # When True, comfort_mode is force-cleared on session boundary even if turns_remaining > 0.
    clear_on_session_boundary: true
  anger:
    enabled: true
    timeout_hours: 24
    # How many consecutive rude flags trigger anger_mode.
    rude_repeat_threshold: 2
    # Regex patterns that, when matched on inbound, clear anger_mode.
    softening_patterns:
      - "(?i)\\b(sorry|sry|my bad|i apologize|didn't mean|that came out wrong|wasn't trying to)\\b"
    clear_on_session_boundary: true

# ============================================================================
# Phase E: outbound voice notes (ElevenLabs Flash v2.5)
# ============================================================================

voice_outbound:
  provider: elevenlabs_flash_v2_5
  outbound_voice_id: null  # set after picking via ElevenLabs Voice Design v3
  api_key_env: ELEVENLABS_API_KEY
  daily_cap: 10
  max_chars: 400
  request_timeout_sec: 30.0
  mood_gates:
    - tired
    - focused
    - weirdly good
  outbound_mood_profiles:
    default:
      stability: 0.55
      similarity_boost: 0.75
      style: 0.0
      use_speaker_boost: true
    tired:
      stability: 0.75
      similarity_boost: 0.65
      style: 0.0
      use_speaker_boost: true
    night:
      stability: 0.40
      similarity_boost: 0.80
      style: 0.25
      use_speaker_boost: true

# ============================================================================
# Phase S: annual review ceremony (Dec 26-31)
# ============================================================================

annual_review:
  enabled: true
  model: deepseek/deepseek-v4-flash  # cheap aux LLM
  fire_hour: 11                       # local hour for daily check

# ============================================================================
# Phase O: background research worker + callback producer
# ============================================================================

research_worker:
  enabled: true
  max_loops_per_day: 2
  max_tasks_per_loop: 2
  per_task_max_turns: 8
  task_age_max_days: 14
