  # Phase 9: reaction-ONLY reply mode. Roll once per inbound user message
  # BEFORE respond(); on hit, ship a reaction and skip the LLM call entirely.
  # Free + low-effort response. Substantive messages (questions, long text)
  # bypass this gate and always get a real reply.
  solo_reaction_probability: 0.05

reactions_as_turns:
  # Phase 9: when the owner reacts to one of Hikari's messages with an emoji
  # (other than 👍/👎, which stay silent for the drift-judge feedback channel),
  # treat the reaction as a conversational nudge and trigger a Hikari turn.
  enabled: true
  # If true, 👍/👎 ALSO trigger a reply (in addition to recording feedback).
  # Default false — keeps the ground-truth channel un-influenced by replies.
  feedback_emojis_also_reply: false
  # Don't fire two reaction-turns back-to-back within this window. Prevents
  # rapid-tap loops + cost runaway.
  cooldown_sec: 90
  # Hard daily cap to bound spend in the worst case.
  max_per_day: 20
  # In irritable mood, skip the reply ~half the time (in voice).
  irritable_skip_probability: 0.5

