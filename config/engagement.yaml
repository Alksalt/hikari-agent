# ============================================================================
# Stage 5: security & infra
# ============================================================================

prompt_injection:
  enabled: true
  # untrusted_tools DELETED (Phase A, step 9) — now sourced from
  # config/tools.yaml via tools._tools_yaml.load_registry().untrusted_tools().
  # wrap_patterns DELETED (Phase A, step 9) — now sourced from
  # config/tools.yaml via tools._tools_yaml.load_registry().wrap_patterns().
  # canary_token_env DELETED (Sprint A) — dead key, no callers.
  # flag_untrusted_urls DELETED (Sprint A) — dead key, no callers.
  # Any outbound action whose args contain content originating from an untrusted
  # tool gets flagged in the audit log with an "untrusted_origin" marker.

logfire:
  enabled_env: HIKARI_LOGFIRE_ENABLED
  token_env: LOGFIRE_TOKEN
  service_name: hikari

scheduler:
  # IANA timezone for cron jobs (daily_reflection, morning_brief, etc.).
  # CronTrigger(hour=N) fires at N o'clock in THIS zone.
  timezone: "Europe/Oslo"
  default_misfire_grace_sec: 300  # grace window when an interval job is overdue

