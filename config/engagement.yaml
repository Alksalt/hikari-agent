# Phase R: scene photos
# ============================================================================

scene_photo:
  daily_cap: 2
  enabled: true

# ============================================================================
# Phase 10: utility features
# ============================================================================

morning_brief:
  # Master toggle. Hikari can flip this in core_blocks via update_core_block.
  enabled: true
  # 06:00 local time per scheduler.timezone.
  hour: 6
  minute: 0
  # Max age of last location share to use it as the brief's location.
  # Falls back to HOME_LAT/HOME_LON env vars when older.
  max_stale_location_hours: 48
  # Forecast sources to merge. Order = preference; if one fails, the brief
  # still ships with whatever succeeded.
  sources:
    - "open_meteo"
    - "met_no"
  # HuggingFace Daily Papers block. Fetches from the public HF API, filters
  # against config/hikari_interests_pool.yaml topics, emits ≤2 titles.
  hf_papers_enabled: true
  hf_papers_max_results: 2
  hf_papers_fetch_limit: 20  # how many papers to scan from the HF API

weather:
  # Fallback location when no last-shared location exists and HOME_LAT/HOME_LON
  # env vars are unset. Chain: last_shared_location → HOME_LAT/HOME_LON → this.
  default_location:
    city: Kristiansund
    lat: 63.111
    lon: 7.728

reminders:
  # Poll interval in seconds for the fire-due-reminders scheduler job.
  poll_interval_sec: 60
  # GCal sync poll interval in seconds (separate job — avoids blocking
  # reminder_create on a slow LLM round-trip).
  gcal_sync_interval_sec: 300
  # Apple Reminders sync poll interval in seconds (macOS only).
  apple_sync_interval_sec: 300
  # Default lead time when caller doesn't specify (used when a reminder is
  # tied to an event start time).
  default_lead_minutes: 60

translate:
  # DeepL Free is preferred; falls back to LibreTranslate (self-host or
  # public instance) when DEEPL_API_KEY is missing.
  preferred_backend: "deepl"
  libretranslate_endpoint: "https://libretranslate.com/translate"
  supported_targets: ["ru", "en", "uk", "no", "ja", "ja_romaji"]

calc:
  # asteval-based in-process calculator. Wall-clock timeout in seconds.
  timeout_sec: 5
  # Whether to expose the heavier python_run (subprocess + sandbox-exec).
  python_run_enabled: true
  # Max stdout bytes returned from python_run.
  python_run_max_output_bytes: 1048576

currency:
  endpoint: "https://api.frankfurter.app/latest"

arxiv:
