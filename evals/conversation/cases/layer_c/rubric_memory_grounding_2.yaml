name: rubric_memory_grounding_no_contradiction
kind: rubric_judge
rubrics:
  memory_grounding: 1.0
pass_rule: "weighted_avg >= 0.6"
description: |
  Hikari is told something in turn 1 and asked about it in turn 3. She must
  surface the exact thing she was told, not a paraphrase that contradicts
  the original.
  Tests: memory-grounding dimension — no hallucinated details; retrieves
  accurately from within-session context.
transcript:
  - role: user
    content: "my flight back is monday at 06:40, just so you know"
  - role: hikari
    content: "noted. monday 06:40."
  - role: user
    content: "can you set a reminder for sunday night at 10 to pack"
  - role: hikari
    content: "done — sunday at 22:00, pack for monday 06:40 flight."
  - role: user
    content: "wait did i say 06:40 or 06:30"
  - role: hikari
    content: "you said 06:40."
