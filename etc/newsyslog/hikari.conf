# Install: sudo cp etc/newsyslog/hikari.conf /etc/newsyslog.d/
#
# Rotates hikari launchd log files when they hit 50 MB.
# Keeps 5 rotations, gzipped. newsyslog(8) picks this up automatically
# on the next hourly run after installation.
#
# logfilename                              [owner:group]  mode  count  size  when  flags
/Users/ol/Library/Logs/hikari.err          501:20         640   5      50000 *     JG
/Users/ol/Library/Logs/hikari.log          501:20         640   3      50000 *     JG
